<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympus Style Slot Demo</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:radial-gradient(circle at top,#2b1b4d,#0b0718);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}
body:before{
content:'';
position:fixed;
top:0;left:0;right:0;bottom:0;
background-image:radial-gradient(#ffffff22 1px,transparent 1px);
background-size:3px 3px;
opacity:0.3;
pointer-events:none;
}
.wrap{
width:520px;
background:linear-gradient(180deg,#2a1b52,#120a2a);
padding:20px;
border-radius:22px;
box-shadow:0 0 40px rgba(255,200,0,0.15);
border:2px solid rgba(255,215,0,0.25);
position:relative;
}
h1{
text-align:center;
margin:0 0 10px;
font-size:30px;
color:#ffd36b;
text-shadow:0 0 10px rgba(255,200,0,0.4);
}
.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
margin-bottom:15px;
}
.cell{
height:70px;
background:linear-gradient(180deg,#3a2a6a,#1a1038);
border:1px solid rgba(255,215,0,0.35);
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
box-shadow:inset 0 0 10px rgba(0,0,0,0.5);
}
.controls{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
}
button{
border:none;
background:linear-gradient(180deg,#ffd36b,#ffb300);
color:#111;
padding:10px 14px;
border-radius:12px;
font-weight:800;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}
button:hover{transform:scale(1.05)}
.info{
margin-top:10px;
font-size:14px;
line-height:1.6;
}
.win{
animation:flash .5s infinite alternate;
}
@keyframes flash{
from{transform:scale(1)}
to{transform:scale(1.15);filter:brightness(1.5)}
}
.topbar{
text-align:center;
margin-bottom:10px;
font-size:12px;
opacity:0.8;
}
</style>
</head>
<body>
<div class='wrap'>
<div class='topbar'>⚡ Olympus Inspired Demo Slot ⚡</div>
<h1>⚡ ZEUS SLOT ⚡</h1>
<div id='grid' class='grid'></div>
<div class='controls'>
<button onclick='betDown()'>- Bet</button>
<button onclick='spin()'>SPIN</button>
<button onclick='betUp()'>+ Bet</button>
</div>
<div class='info'>
<div>Bakiye: <span id='bal'>1000</span> ₺</div>
<div>Bahis: <span id='bet'>10</span> ₺</div>
<div>Kazanç: <span id='win'>0</span> ₺</div>
<div id='msg'>Hazır</div>
</div>
</div>

<script>
const symbols=['💎','⚡','👑','🔷','🟣','🟢'];
const grid=document.getElementById('grid');
let balance=1000,bet=10,spinning=false;

function render(vals=[],wins=[]){
grid.innerHTML='';
for(let i=0;i<30;i++){
const d=document.createElement('div');
d.className='cell'+(wins.includes(i)?' win':'');
d.textContent=vals[i]||symbols[Math.floor(Math.random()*symbols.length)];
grid.appendChild(d);
}
}

function update(){
document.getElementById('bal').textContent=balance;
document.getElementById('bet').textContent=bet;
}

function betUp(){if(bet<100)bet+=10;update()}
function betDown(){if(bet>10)bet-=10;update()}

function randBoard(){return Array.from({length:30},()=>symbols[Math.floor(Math.random()*symbols.length)])}

function calc(board){
let total=0;let wins=[];
for(let s of symbols){
let count=board.filter(x=>x===s).length;
if(count>=8){
let mult=count>=12?5:count>=10?3:2;
total+=bet*mult;
board.forEach((v,i)=>{if(v===s)wins.push(i)});
}
}
return {total,wins};
}

function tumble(board){
let total=0;
let loops=0;
let mult=1;
while(loops<8){
let res=calc(board);
if(res.total===0)break;
total+=res.total;
res.wins.forEach(i=>board[i]='');
for(let c=0;c<6;c++){
let col=[];
for(let r=0;r<5;r++){
let idx=r*6+c;
if(board[idx])col.push(board[idx]);
}
while(col.length<5)col.unshift(symbols[Math.floor(Math.random()*symbols.length)]);
for(let r=0;r<5;r++)board[r*6+c]=col[r];
}
if(Math.random()<0.4)mult+=Math.floor(Math.random()*5)+2;
loops++;
}
return {board,total:total*mult,mult};
}

function spin(){
if(spinning||balance<bet)return;
spinning=true;
balance-=bet;
update();
document.getElementById('msg').textContent='Zeus döndürüyor...';
let t=0;
const iv=setInterval(()=>{
render(randBoard());
t++;
if(t>10){
clearInterval(iv);
let board=randBoard();
let res=tumble(board);
render(res.board,res.board.map((_,i)=>res.board[i]));
balance+=res.total;
document.getElementById('win').textContent=res.total;
document.getElementById('msg').textContent=res.total>0?'⚡ Kazandın x'+res.mult:'Tekrar dene';
update();
spinning=false;
}
},90);
}

render();update();
</script>
</body>
</html>
