<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gates of Olympus Demo V3</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(180deg,#120826,#25114d,#130822);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.game{
width:440px;
background:#1d123d;
padding:18px;
border-radius:22px;
border:2px solid gold;
box-shadow:0 0 30px rgba(0,0,0,.6);
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
color:#ffd700;
margin-bottom:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
margin-bottom:14px;
}

.cell{
height:58px;
background:linear-gradient(180deg,#5a3bb3,#2d195c);
border:2px solid #d4af37;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
}

.win{
animation:blink .6s infinite alternate;
}

@keyframes blink{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.panel{
line-height:1.8;
font-size:15px;
}

.controls{
display:grid;
grid-template-columns:1fr 2fr 1fr;
gap:8px;
margin-top:12px;
}

button{
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
background:#ffb400;
color:#111;
}

.buy{
margin-top:10px;
width:100%;
background:#42ff8c;
}

.msg{
text-align:center;
margin-top:10px;
min-height:24px;
font-weight:bold;
color:#7dff6e;
}
</style>
</head>
<body>

<div class="game">

<div class="title">⚡ Gates of Olympus ⚡</div>

<div class="grid" id="grid"></div>

<div class="panel">
<div>Bakiye: <span id="balance">100000</span> ₺</div>
<div>Bahis: <span id="bet">10</span> ₺</div>
<div>Kazanç: <span id="win">0</span> ₺</div>
<div>Free Spin: <span id="free">0</span></div>
</div>

<div class="controls">
<button onclick="betDown()">-</button>
<button onclick="spin()">SPIN</button>
<button onclick="betUp()">+</button>
</div>

<button class="buy" onclick="buyFeature()">BUY FREESPINS</button>

<div class="msg" id="msg">Hazır</div>

</div>

<script>
const symbols=['💎','🟩','🟨','🟥','🔷','🟣','👑','⏳'];
const scatter='⚡';
const multipliers=[2,3,5,10,25,50,100,250,500];

let balance=100000;
let bet=10;
let totalWin=0;
let freeSpins=0;
let busy=false;

const grid=document.getElementById("grid");
const balanceEl=document.getElementById("balance");
const betEl=document.getElementById("bet");
const winEl=document.getElementById("win");
const freeEl=document.getElementById("free");
const msg=document.getElementById("msg");

function randomSymbol(){
if(Math.random()<0.07) return scatter;
return symbols[Math.floor(Math.random()*symbols.length)];
}

function createBoard(){
return Array.from({length:30},()=>randomSymbol());
}

function draw(board,wins=[]){
grid.innerHTML='';
board.forEach((s,i)=>{
let d=document.createElement("div");
d.className='cell'+(wins.includes(i)?' win':'');
d.textContent=s;
grid.appendChild(d);
});
}

function updateUI(){
balanceEl.textContent=balance;
betEl.textContent=bet;
winEl.textContent=totalWin;
freeEl.textContent=freeSpins;
}

function betUp(){
if(bet<1000) bet+=10;
updateUI();
}

function betDown(){
if(bet>10) bet-=10;
updateUI();
}

function countWins(board){
let counts={};
let payout=0;
let winIdx=[];

board.forEach(s=>{
if(s!==scatter){
counts[s]=(counts[s]||0)+1;
}
});

for(let sym in counts){
let c=counts[sym];

if(c>=8){
let multi=c>=12?5:c>=10?3:2;
payout += bet*multi;

board.forEach((v,i)=>{
if(v===sym) winIdx.push(i);
});
}
}

return {payout,winIdx};
}

function tumble(board){
let total=0;
let finalMulti=1;

for(let n=0;n<8;n++){

let res=countWins(board);

if(res.payout<=0) break;

total += res.payout;

res.winIdx.forEach(i=>board[i]='');

for(let col=0;col<6;col++){

let arr=[];

for(let row=0;row<5;row++){
let idx=row*6+col;
if(board[idx]) arr.push(board[idx]);
}

while(arr.length<5){
arr.unshift(randomSymbol());
}

for(let row=0;row<5;row++){
board[row*6+col]=arr[row];
}
}

if(Math.random()<0.35){
finalMulti += multipliers[Math.floor(Math.random()*multipliers.length)];
}
}

total*=finalMulti;

return {board,total,finalMulti};
}

function spin(){

if(busy) return;
if(balance<bet && freeSpins===0) return;

busy=true;
totalWin=0;
updateUI();

if(freeSpins>0){
freeSpins--;
}else{
balance-=bet;
}

msg.textContent="Zeus döndürüyor...";

let t=0;

let anim=setInterval(()=>{

draw(createBoard());

t++;

if(t>10){

clearInterval(anim);

let board=createBoard();

let scat=board.filter(x=>x===scatter).length;

if(scat>=4){
freeSpins += 15;
}

let res=tumble(board);

draw(res.board);

totalWin=res.total;
balance += totalWin;

updateUI();

if(scat>=4){
msg.textContent="⚡ 4 Scatter! +15 Free Spins";
}else if(totalWin>0){
msg.textContent="Kazandın x"+res.finalMulti;
}else{
msg.textContent="Tekrar dene";
}

busy=false;
}

},80);
}

function buyFeature(){

if(busy) return;

let cost=bet*100;

if(balance<cost){
msg.textContent="Yetersiz bakiye";
return;
}

balance -= cost;
freeSpins += 15;

let board=createBoard();

/* 4 scatter garanti */
board[0]=scatter;
board[5]=scatter;
board[12]=scatter;
board[20]=scatter;

draw(board);

updateUI();

msg.textContent="⚡ BUY FREESPINS ALINDI (+15)";
}

draw(createBoard());
updateUI();
</script>

</body>
</html>
