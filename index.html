<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gates of Olympus Demo V4</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}

body{
background:linear-gradient(180deg,#120826,#25114d,#130822);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#fff;
}

.game{
width:440px;
background:#1d123d;
padding:18px;
border-radius:22px;
border:2px solid gold;
box-shadow:0 0 30px rgba(0,0,0,.6);
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
color:#ffd700;
margin-bottom:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
margin-bottom:14px;
}

.cell{
height:58px;
background:linear-gradient(180deg,#5a3bb3,#2d195c);
border:2px solid #d4af37;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:bold;
text-align:center;
}

.scatter{
background:linear-gradient(180deg,#ffd700,#c68b00);
color:#111;
}

.multi{
background:linear-gradient(180deg,#46ff87,#169d45);
color:#111;
font-size:18px;
}

.win{
animation:blink .6s infinite alternate;
}

@keyframes blink{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.panel{
font-size:15px;
line-height:1.8;
}

.controls{
display:grid;
grid-template-columns:1fr 2fr 1fr;
gap:8px;
margin-top:12px;
}

button{
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
background:#ffb400;
}

.buy{
margin-top:10px;
width:100%;
background:#48ff93;
}

.msg{
text-align:center;
margin-top:10px;
font-weight:bold;
min-height:24px;
color:#8dff75;
}
</style>
</head>
<body>

<div class="game">

<div class="title">⚡ Gates of Olympus ⚡</div>

<div class="grid" id="grid"></div>

<div class="panel">
<div>Bakiye: <span id="balance">100000</span> ₺</div>
<div>Bahis: <span id="bet">10</span> ₺</div>
<div>Kazanç: <span id="win">0</span> ₺</div>
<div>Free Spin: <span id="free">0</span></div>
</div>

<div class="controls">
<button onclick="betDown()">-</button>
<button onclick="spin()">SPIN</button>
<button onclick="betUp()">+</button>
</div>

<button class="buy" onclick="buyFeature()">BUY FREESPINS</button>

<div class="msg" id="msg">Hazır</div>

</div>

<script>
const symbols=['💎','🟩','🟨','🟥','🔷','🟣','👑','⏳'];
const scat='⚡';
const multiValues=[2,3,5,10,25,50,100,250,500];

let balance=100000;
let bet=10;
let totalWin=0;
let freeSpins=0;
let busy=false;

const grid=document.getElementById("grid");
const balanceEl=document.getElementById("balance");
const betEl=document.getElementById("bet");
const winEl=document.getElementById("win");
const freeEl=document.getElementById("free");
const msg=document.getElementById("msg");

function randomItem(){

let r=Math.random();

if(r<0.08) return {type:"scatter",value:scat};

if(r<0.15){
let m=multiValues[Math.floor(Math.random()*multiValues.length)];
return {type:"multi",value:m};
}

return {
type:"symbol",
value:symbols[Math.floor(Math.random()*symbols.length)]
};
}

function createBoard(){
return Array.from({length:30},()=>randomItem());
}

function draw(board,wins=[]){

grid.innerHTML='';

board.forEach((item,i)=>{

let d=document.createElement("div");

d.className='cell';

if(item.type==="scatter") d.classList.add("scatter");
if(item.type==="multi") d.classList.add("multi");
if(wins.includes(i)) d.classList.add("win");

if(item.type==="multi"){
d.textContent=item.value+"x";
}else{
d.textContent=item.value;
}

grid.appendChild(d);

});
}

function updateUI(){
balanceEl.textContent=balance;
betEl.textContent=bet;
winEl.textContent=totalWin;
freeEl.textContent=freeSpins;
}

function betUp(){
if(bet<1000) bet+=10;
updateUI();
}

function betDown(){
if(bet>10) bet-=10;
updateUI();
}

function countWins(board){

let counts={};
let payout=0;
let winIdx=[];
let multiplier=1;

board.forEach((item,i)=>{

if(item.type==="symbol"){
counts[item.value]=(counts[item.value]||0)+1;
}

if(item.type==="multi"){
multiplier += item.value;
}

});

for(let sym in counts){

let c=counts[sym];

if(c>=8){

let multi=c>=12?5:c>=10?3:2;

payout += bet*multi;

board.forEach((item,i)=>{
if(item.type==="symbol" && item.value===sym){
winIdx.push(i);
}
});
}
}

return {payout,winIdx,multiplier};
}

function tumble(board){

let total=0;
let finalMulti=1;

for(let n=0;n<8;n++){

let res=countWins(board);

if(res.payout<=0) break;

total += res.payout;
finalMulti = res.multiplier;

res.winIdx.forEach(i=>board[i]=null);

for(let col=0;col<6;col++){

let arr=[];

for(let row=0;row<5;row++){

let idx=row*6+col;

if(board[idx]) arr.push(board[idx]);

}

while(arr.length<5){
arr.unshift(randomItem());
}

for(let row=0;row<5;row++){
board[row*6+col]=arr[row];
}

}

}

total*=finalMulti;

return {board,total,finalMulti};
}

function spin(){

if(busy) return;
if(balance<bet && freeSpins===0) return;

busy=true;
totalWin=0;

if(freeSpins>0){
freeSpins--;
}else{
balance-=bet;
}

updateUI();

msg.textContent="Zeus döndürüyor...";

let t=0;

let anim=setInterval(()=>{

draw(createBoard());

t++;

if(t>10){

clearInterval(anim);

let board=createBoard();

let scatCount=board.filter(x=>x.type==="scatter").length;

if(scatCount>=4){
freeSpins += 15;
}

let res=tumble(board);

draw(res.board);

totalWin=res.total;
balance+=totalWin;

updateUI();

if(scatCount>=4){
msg.textContent="⚡ 4 Scatter +15 Free Spins";
}
else if(totalWin>0){
msg.textContent="Kazandın! x"+res.finalMulti;
}
else{
msg.textContent="Tekrar dene";
}

busy=false;
}

},80);
}

function buyFeature(){

if(busy) return;

let cost=bet*100;

if(balance<cost){
msg.textContent="Yetersiz bakiye";
return;
}

balance-=cost;
freeSpins+=15;

let board=createBoard();

board[0]={type:"scatter",value:scat};
board[6]={type:"scatter",value:scat};
board[12]={type:"scatter",value:scat};
board[18]={type:"scatter",value:scat};

draw(board);

updateUI();

msg.textContent="⚡ BUY FREESPINS +15";
}

draw(createBoard());
updateUI();
</script>

</body>
</html>
