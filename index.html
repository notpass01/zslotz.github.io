<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gates of Olympus Demo V2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(180deg,#120826,#25114d,#130822);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.game{
width:430px;
background:#1d123d;
padding:18px;
border-radius:20px;
box-shadow:0 0 30px rgba(0,0,0,.6);
border:2px solid gold;
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:15px;
color:#ffd700;
}

.grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
margin-bottom:14px;
}

.cell{
height:58px;
background:linear-gradient(180deg,#5a3bb3,#2d195c);
border:2px solid #d4af37;
border-radius:12px;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
font-weight:bold;
transition:.2s;
}

.win{
animation:blink .6s infinite alternate;
}

@keyframes blink{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

.panel{
margin-top:10px;
font-size:15px;
line-height:1.8;
}

.controls{
display:flex;
gap:8px;
margin-top:12px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
font-size:16px;
background:#ffb400;
}

button:hover{
opacity:.9;
}

.msg{
margin-top:10px;
text-align:center;
color:#8cff66;
font-weight:bold;
min-height:22px;
}
</style>
</head>
<body>

<div class="game">

<div class="title">⚡ Gates of Olympus ⚡</div>

<div id="grid" class="grid"></div>

<div class="panel">
<div>Bakiye: <span id="balance">1000</span> ₺</div>
<div>Bahis: <span id="bet">10</span> ₺</div>
<div>Kazanç: <span id="win">0</span> ₺</div>
<div>Free Spin: <span id="free">0</span></div>
</div>

<div class="controls">
<button onclick="betDown()">-</button>
<button onclick="spin()">SPIN</button>
<button onclick="betUp()">+</button>
</div>

<div class="msg" id="msg">Hazır</div>

</div>

<script>
const symbols = ['💎','🟩','🟨','🟥','🔷','🟣','👑','⏳'];
const scatter = '⚡';
const multipliers = [2,3,5,10,25,50,100,250,500];

let balance = 1000;
let bet = 10;
let totalWin = 0;
let freeSpins = 0;
let busy = false;

const grid = document.getElementById("grid");

function randomSymbol(){
if(Math.random() < 0.08) return scatter;
return symbols[Math.floor(Math.random()*symbols.length)];
}

function createBoard(){
return Array.from({length:30},()=>randomSymbol());
}

function draw(board,wins=[]){
grid.innerHTML='';
board.forEach((s,i)=>{
let div=document.createElement("div");
div.className='cell'+(wins.includes(i)?' win':'');
div.textContent=s;
grid.appendChild(div);
});
}

function updateUI(){
balanceEl.textContent = balance;
betEl.textContent = bet;
winEl.textContent = totalWin;
freeEl.textContent = freeSpins;
}

function betUp(){
if(bet<100) bet+=10;
updateUI();
}

function betDown(){
if(bet>10) bet-=10;
updateUI();
}

function countWins(board){
let counts={};
let winIdx=[];
let payout=0;

board.forEach(s=>{
if(s!==scatter){
counts[s]=(counts[s]||0)+1;
}
});

for(let sym in counts){
let c=counts[sym];

if(c>=8){
let multi = c>=12 ? 5 : c>=10 ? 3 : 2;
payout += bet * multi;

board.forEach((v,i)=>{
if(v===sym) winIdx.push(i);
});
}
}

return {payout,winIdx};
}

function tumble(board){
let total=0;
let finalMulti=0;

for(let loop=0;loop<8;loop++){

let result = countWins(board);

if(result.payout<=0) break;

total += result.payout;

result.winIdx.forEach(i=>board[i]='');

for(let col=0;col<6;col++){

let arr=[];

for(let row=0;row<5;row++){
let idx=row*6+col;
if(board[idx]) arr.push(board[idx]);
}

while(arr.length<5){
arr.unshift(randomSymbol());
}

for(let row=0;row<5;row++){
board[row*6+col]=arr[row];
}

}

if(Math.random()<0.35){
finalMulti += multipliers[Math.floor(Math.random()*multipliers.length)];
}

}

if(finalMulti>0){
total*=finalMulti;
}

return {board,total,finalMulti};
}

function spin(){

if(busy) return;

if(balance<bet && freeSpins===0) return;

busy=true;
totalWin=0;
updateUI();

if(freeSpins>0){
freeSpins--;
}else{
balance-=bet;
}

msg.textContent="Zeus döndürüyor...";

let t=0;

let anim=setInterval(()=>{

draw(createBoard());

t++;

if(t>12){

clearInterval(anim);

let board=createBoard();

let scatters = board.filter(x=>x===scatter).length;

if(scatters>=4){
freeSpins+=10;
}

let result=tumble(board);

draw(result.board);

totalWin=result.total;

balance += totalWin;

updateUI();

if(scatters>=4){
msg.textContent="⚡ FREE SPIN +10";
}
else if(totalWin>0){
msg.textContent="Kazandın! x"+(result.finalMulti||1);
}
else{
msg.textContent="Tekrar dene";
}

busy=false;

}

},90);

}

draw(createBoard());
updateUI();
</script>

</body>
</html>
