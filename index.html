<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slot Demo</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#1b1433;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
.wrap{width:420px;background:#2a1d52;padding:20px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.4)}
h1{text-align:center;margin:0 0 15px;font-size:28px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:15px}
.cell{heigs:12px;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:bold}
.controls{display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap}
button{border:none;background:#ffb400;color:#111;padding:10px 14px;border-radius:12px;font-weight:700;cursor:pointer}
button:hover{transform:translateY(-1px)}
.info{font-size:14px;margin-top:10px;line-height:1.6}
.win{animation:flash .6s infinite alternate}
@keyframes flash{from{transform:scale(1)}to{transform:scale(1.08)}}
</style>
</head>
<body>
<div class='wrap'>
<h1>Olympus Demo</h1>
<div id='<h1>⚡ Gates of Olympus ⚡</h1>div>
<div class='controls'>
<button onclick='betDown()'>- Bet</button>
<button onclick='spin()'>SPIN</button>
<button onclick='betUp()'>+ Bet</button>
</div>
<div class='info'>
<div>Bakiye: <span id='bal'>1000</span> ₺</div>
<div>Bahis: <span id='bet'>10</span> ₺</div>
<div>Kazanç: <span id='win'>0</span> ₺</div>
<div id='msg'>Hazır</div>
</div>
</div>
<script>
const symbols=['💎','⚡','👑','🔔','🍀','7'];
const grid=document.getElementById('grid');
let balnder(vals=[],wins=[]){grid.innerHTML='';for(let i=0;i<15;i++){const d=document.createElement('div');d.className='cell'+(wins.includes(i)?' win':'');d.textContent=vals[i]||symbols[Math.floor(Math.random()*symbols.length)];grid.appendChild(d)}}
function update(){bal.textContent=balance;betEl=document.getElementById('bet');betEl.textContent=bet;}
function betUp(){if(bet<100)bet+=10;update()}
function betDown(){if(bet>10)bet-=10;update()}
function randBoard(){return Array.from({length:15},()=>symbols[Math.floor(Math.random()*symbols.length)])}
function calc(board){let total=0;let wins=[];for(let r=0;r<3;r++){let row=[board[r*5],board[r*5+1],board[r*5+2],board[r*5+3],board[r*5+4]];let first=row[0];if(row.every(x=>x===first)){total+=bet*5;for(let c=0;c<5;c++)wins.push(r*5+c)}}return {total,wins}}
function spin(){if(spinning||balance<bet)return;spinning=true;balance-=bet;update();msg.textContent='Dönüyor...';let t=0;const iv=setInterval(()=>{render(randBoard());t++;if(t>12){clearInterval(iv);const board=randBoard();const res=calc(bobalance+=res.total;document.getElementById('win').textContent=res.total;msg.textContent=res.total>0?'Kazandın!':'Tekrar dene';update();spinning=false;}},90)}
render();update();

// Gates style upgrade
const mults=[2,3,5,10,25];
function countWins(board){let counts={};board.forEach(s=>counts[s]=(counts[s]||0)+1);let payout=0;let winIdx=[];for(const sym of]||0;if(c>=8){let factor=c>=12?5:c>=10?3:2;payout+=bet*factor;board.forEach((v,i)=>{if(v===sym)winIdx.push(i)});}}
return {payout,winIdx};}
function tumble(board){let total=0;let loops=0;let multi=0;while(loops<10){let res=countWins(board);if(res.payout===0)break;total+=res.payout;res.winIdx.forEach(i=>board[i]='');for(let c=0;c<5;c++){let col=[];for(let r=0;r<3;r++){let idx=r*5+c;if(board[idx])col.push(board[idx]);}
while(col.length<3)col.unshift(symbols[Math.floor(Math.random()*symbols.length)]);
for(let r=0;r<3;r++)board[r*5+c]=col[r];}
if(Math.random()<0.35)multi+=mults[Math.floor(Math.random()*mults.lengtlti>0)total*=multi;return {board,total,multi};}
spin=function(){if(spinning||balance<bet)return;spinning=true;balance-=bet;update();msg.textContent='Dönüyor...';let t=0;const iv=setInterval(()=>{render(randBoard());t++;if(t>12){clearInterval(iv);let board=randBoard();let res=tumble(board);render(res.board);balance+=res.total;document.getElementById('win').textContent=res.total;msg.textContent=res.total>0?('Kazandın x'+(res.multi||1)):'Tekrar dene';update();spinning=false;}},90)};
</script>
</body>
</html>
